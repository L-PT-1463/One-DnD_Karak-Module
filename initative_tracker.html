<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karak Initiative Tracker</title>
    <link rel="icon" type="image/x-icon" href="images\misc\logo.png">

<style>
    body {
        font-family: Georgia, "Times New Roman", serif;
        padding: 20px;
        background: #e9e9d9;
    }

    h1, h2, h3, h4, h5, h6 {
        font-family: "Trebuchet MS", sans-serif;
        color: #e9e9d9;
    }

    .player-card {
        background: #ceb348;
        padding: 15px;
        margin: 15px 0;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .initiative-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    select,
    input,
    button {
        font-family: inherit;
        margin: 5px;
        padding: 5px;
    }

    .monster-list {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        align-items: center;
    }

    .monster-tag {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #e9e9d9;
        padding: 6px 10px;
        border-radius: 6px;
    }

    .hp-max {
        font-size: 13px;
        opacity: 0.8;
    }

    .kill-btn {
        background: #601a1a;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        cursor: pointer;
        font-size: 12px;
    }

    .flee-btn {
        background: #6382b4;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        cursor: pointer;
        font-size: 12px;
    }

    .side {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .monster-picker {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .top-controls {
        margin-bottom: 15px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
    }

/* =========================
STICKY HEADER
========================= */

.site-header {
    position: sticky;
    top: 0;
    z-index: 1000;

    background: #601a1a;
    padding: 10px 0 15px 0;
    margin: -20px -20px 20px -20px;

    display: flex;
    flex-direction: column;
    align-items: center;

    box-shadow: 0 2px 5px rgba(28, 26, 19, 0.1);
}

.site-header img {
    max-height: 80px;
    width: auto;
}

.site-header h1 {
    margin: 8px 0 0 0;
    font-family: "Trebuchet MS", sans-serif;
    text-align: center;
}
</style>
</head>

<body>

<header class="site-header">
    <img src="images\misc\logo_complete.png" alt="Karak Logo">
    <h1>One D&D: Karak - Initiative Tracker</h1>

</header>

<div class="top-controls">

    <label>
        Number of Players:
        <select id="playerCount">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    </label>

    <button onclick="generatePlayers()">Generate Players</button>
</div>

<div id="playersContainer"></div>

<script>

// =========================
// MONSTER DATABASE
// =========================
const monsters = [
    { name: "Rat", hp: 1, canFlee: true },
    { name: "Skeleton Turnkey", hp: 1, canFlee: true },
    { name: "Skeleton Warrior", hp: 1, canFlee: false },
    { name: "Skeleton King", hp: 1, canFlee: false },
    { name: "Spider", hp: 1, canFlee: false },
    { name: "Mummy", hp: 1, canFlee: false },
    { name: "The Fallen", hp: 1, canFlee: false },
    { name: "The Dragon", hp: 1, canFlee: false }
];

// =========================
// PLAYER DATABASE
// =========================
const playersBase = [
    { name: "Aderyn"},
    { name: "Horan"},
    { name: "Victorius"},

    { name: "Argentus"},
    { name: "Lord Xanurs"},
    { name: "Taia"},

    { name: "Elspeth"},
    { name: "Hannah"},
    { name: "Kirma"},
    { name: "Valduk"},
    
    { name: "Baron Markul"},
    { name: "Doctor Sidhar"},
    { name: "Lady Lorraine"}
];

let monsterUID = 0;

// =========================
// BACKEND MONSTER STATE
// =========================
const monsterDB = {};

// =========================
// CREATE INSTANCE
// =========================
function createMonster(name) {

    const base = monsters.find(m => m.name === name);
    const id = monsterUID++;

    monsterDB[id] = {
        id,
        name: base.name,
        hp: base.hp,
        maxHp: base.hp,
        canFlee: base.canFlee
    };

    return id;
}

// =========================
// GENERATE UI
// =========================
function generatePlayers() {

    const count = parseInt(document.getElementById("playerCount").value);
    const container = document.getElementById("playersContainer");

    container.innerHTML = "";

    for (let i = 1; i <= count; i++) {

        const card = document.createElement("div");
        card.className = "player-card";

        card.innerHTML = `
            <div class="initiative-row">

                <div class="side">
                    <button onclick="openPicker(${i}, 'before')">+</button>
                    <div id="beforeList${i}" class="monster-list"></div>
                </div>

                >

                <div>
                    <select id="player${i}">
                        ${playersBase.map(p =>
                            `<option value="${p.name}">${p.name}</option>`
                        ).join("")}
                    </select>

                    <button class="flee-btn" onclick="playerFlee(${i})">
                        Flee
                    </button>
                </div>

                >

                <div class="side">
                    <div id="afterList${i}" class="monster-list"></div>
                    <button onclick="openPicker(${i}, 'after')">+</button>
                </div>

            </div>
        `;

        container.appendChild(card);
    }
}

// =========================
// PICKER
// =========================
function openPicker(playerNumber, side) {

    const list = document.getElementById(`${side}List${playerNumber}`);

    const picker = document.createElement("div");
    picker.className = "monster-picker";

    const existing = Object.values(monsterDB);

    picker.innerHTML = `
        <select>
            <option value="new">+ New Monster</option>
            <option disabled>────────────</option>
            ${monsters.map(m =>
                `<option value="tmpl:${m.name}">${m.name}</option>`
            ).join("")}
            <option disabled>────────────</option>
            ${existing.map(m =>
                `<option value="id:${m.id}">${m.name} (#${m.id})</option>`
            ).join("")}
        </select>
        <button>OK</button>
    `;

    const select = picker.querySelector("select");
    const btn = picker.querySelector("button");

    btn.onclick = () => {

        let id;

        if (select.value === "new") {
            id = createMonster("Rat");
        }
        else if (select.value.startsWith("tmpl:")) {
            const name = select.value.split(":")[1];
            id = createMonster(name);
        }
        else {
            id = parseInt(select.value.replace("id:", ""));
        }

        addMonsterUI(playerNumber, side, id);
        picker.remove();
    };

    list.appendChild(picker);
}

// =========================
// ADD TO UI
// =========================
function addMonsterUI(playerNumber, side, id) {

    const list = document.getElementById(`${side}List${playerNumber}`);
    const m = monsterDB[id];

    const tag = document.createElement("div");
    tag.className = "monster-tag";
    tag.dataset.id = id;
    tag.dataset.player = playerNumber;

    tag.innerHTML = `
        <span>${m.name} (#${m.id})</span>

        <input type="number"
            min="0"
            max="${m.maxHp}"
            value="${m.hp}"
            oninput="updateHP(${id}, this.value)"
        />

        <span class="hp-max">/ ${m.maxHp}</span>
    `;

    list.appendChild(tag);

    updateButtons(id);
}

// =========================
// UPDATE HP
// =========================
function updateHP(id, value) {

    const m = monsterDB[id];
    if (!m) return;

    let hp = parseInt(value);
    if (isNaN(hp)) hp = 0;

    hp = Math.max(0, Math.min(hp, m.maxHp));

    m.hp = hp;

    document.querySelectorAll(`[data-id="${id}"] input`)
        .forEach(i => i.value = hp);

    updateButtons(id);
}

// =========================
// BUTTON LOGIC
// =========================
function updateButtons(id) {

    const m = monsterDB[id];
    if (!m) return;

    document.querySelectorAll(`[data-id="${id}"]`).forEach(tag => {

        let killBtn = tag.querySelector(".kill-btn");
        let fleeBtn = tag.querySelector(".flee-btn");

        // DEAD → KILL ONLY
        if (m.hp <= 0) {

            if (fleeBtn) fleeBtn.remove();

            if (!killBtn) {
                killBtn = document.createElement("button");
                killBtn.className = "kill-btn";
                killBtn.textContent = "Kill";
                killBtn.onclick = () => kill(id);
                tag.appendChild(killBtn);
            }
        }

        // ALIVE → FLEE ONLY (if allowed)
        else {

            if (killBtn) killBtn.remove();

            if (m.canFlee) {
                if (!fleeBtn) {
                    fleeBtn = document.createElement("button");
                    fleeBtn.className = "flee-btn";
                    fleeBtn.textContent = "Flee";
                    fleeBtn.onclick = () => flee(id);
                    tag.appendChild(fleeBtn);
                }
            } else {
                if (fleeBtn) fleeBtn.remove();
            }
        }
    });
}

// =========================
// KILL
// =========================
function kill(id) {

    delete monsterDB[id];

    document.querySelectorAll(`[data-id="${id}"]`)
        .forEach(el => el.remove());
}

// =========================
// PLAYER FLEE
// =========================
function playerFlee(playerNumber) {

    const monsterIds = new Set();

    document
        .querySelectorAll(`[data-player="${playerNumber}"]`)
        .forEach(tag => {

            const id = parseInt(tag.dataset.id);

            monsterIds.add(id);

            tag.remove();
        });

    monsterIds.forEach(id => {

        const m = monsterDB[id];

        if (!m) return;

        m.hp = m.maxHp;

        document
            .querySelectorAll(`[data-id="${id}"]`)
            .forEach(el => el.remove());
    });
}

</script>

</body>
</html>
